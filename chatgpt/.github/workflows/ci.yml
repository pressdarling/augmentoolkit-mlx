name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: |
          uv pip install -e libs/augmentoolkit
          uv pip install
      - name: Test inference
        run: uv run test_inference
